<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="101.6mm" height="128.5mm" viewBox="0 0 101.6 128.5">
  <!-- 20HP panel: 101.6mm x 128.5mm -->

  <!-- Background -->
  <rect x="0" y="0" width="101.6" height="128.5" fill="#1a1a1a"/>

  <!-- Panel border -->
  <rect x="0.5" y="0.5" width="100.6" height="127.5" fill="none" stroke="#333333" stroke-width="1"/>

  <!-- Title area -->
  <text x="50.8" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="4" fill="#79d8b9" font-weight="bold">ACID SEQUENCER</text>

  <!-- Section labels -->
  <text x="10" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">DENSITY</text>
  <text x="10" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">SPREAD</text>
  <text x="10" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">ACC</text>
  <text x="10" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">SLD</text>

  <text x="26" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">LENGTH</text>
  <text x="26" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">SCALE</text>
  <text x="26" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">ROOT</text>
  <text x="26" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#6f6f6f">OCT</text>

  <text x="18" y="71" text-anchor="middle" font-family="Arial, sans-serif" font-size="2.5" fill="#79d8b9">GEN</text>

  <!-- Input labels -->
  <text x="10" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#6f6f6f">CLK</text>
  <text x="22" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#6f6f6f">RST</text>
  <text x="34" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#6f6f6f">GEN</text>

  <!-- Output labels -->
  <text x="52" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#6f6f6f">V/OCT</text>
  <text x="64" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#6f6f6f">GATE</text>
  <text x="76" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#6f6f6f">ACC</text>
  <text x="88" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#6f6f6f">SLD</text>

  <!-- Decorative lines -->
  <line x1="36" y1="10" x2="36" y2="85" stroke="#333333" stroke-width="0.5"/>
  <line x1="5" y1="90" x2="96" y2="90" stroke="#333333" stroke-width="0.5"/>

  <!-- Brand -->
  <text x="50.8" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="2" fill="#525252">Claude</text>
</svg>
