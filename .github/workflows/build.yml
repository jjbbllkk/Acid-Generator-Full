name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

env:
  RACK_SDK_VERSION: 2.6.4

jobs:
  build-mac:
    name: Build (${{ matrix.sdk-suffix }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk-suffix: mac-arm64
            cross-compile: ""
          - sdk-suffix: mac-x64
            cross-compile: "x86_64-apple-darwin"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download Rack SDK
        run: |
          curl -fL -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-${{ matrix.sdk-suffix }}.zip"
          unzip -q Rack-SDK.zip

      - name: Build
        run: |
          export RACK_DIR="$PWD/Rack-SDK"
          if [ -n "${{ matrix.cross-compile }}" ]; then
            export CROSS_COMPILE="${{ matrix.cross-compile }}"
          fi
          make dist -j"$(sysctl -n hw.ncpu)"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.sdk-suffix }}
          path: dist/*.vcvplugin
          if-no-files-found: error

  build-lin:
    name: Build (lin-x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git unzip zip jq pkg-config \
            libglu-dev libxrandr-dev libxinerama-dev libxcursor-dev \
            libxi-dev libgl-dev libjack-jackd2-dev

      - name: Download Rack SDK
        run: |
          curl -fL -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-lin-x64.zip"
          unzip -q Rack-SDK.zip

      - name: Build
        run: |
          export RACK_DIR="$PWD/Rack-SDK"
          make dist -j"$(nproc)"

      - uses: actions/upload-artifact@v4
        with:
          name: lin-x64
          path: dist/*.vcvplugin
          if-no-files-found: error

  build-win:
    name: Build (win-x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            unzip
            zip
            jq
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config

      - uses: actions/checkout@v4

      - name: Download Rack SDK
        run: |
          curl -fL -o Rack-SDK.zip "https://vcvrack.com/downloads/Rack-SDK-${RACK_SDK_VERSION}-win-x64.zip"
          unzip -q Rack-SDK.zip

      - name: Build
        run: |
          export RACK_DIR="$PWD/Rack-SDK"
          make dist -j"$(nproc)"

      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: dist/*.vcvplugin
          if-no-files-found: error

  release:
    name: Attach to release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-lin, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -name '*.vcvplugin' -print

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.vcvplugin
